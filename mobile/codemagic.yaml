workflows:
  ios-build:
    name: iOS IPA Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.cocoapods
    scripts:
      - name: Install dependencies
        script: |
          cd mobile
          flutter pub get
      - name: Build iOS IPA
        script: |
          cd mobile
          flutter build ipa --release --no-codesign
    artifacts:
      - mobile/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com
