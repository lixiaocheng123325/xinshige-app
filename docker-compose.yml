version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: xinshige-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: xinshige123
      MYSQL_DATABASE: xinshige
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - xinshige-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xinshige-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: xinshige123
      DB_DATABASE: xinshige
      JWT_SECRET: your_jwt_secret_here
      SMS_MOCK: false
      PAY_MOCK: false
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    networks:
      - xinshige-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: xinshige-admin
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - xinshige-network

volumes:
  mysql_data:

networks:
  xinshige-network:
    driver: bridge
